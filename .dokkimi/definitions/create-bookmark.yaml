name: create-bookmark-end-to-end
description: |
  Full authenticated CRUD path — sign in via OAuth, navigate to the new-
  bookmark form, exercise the country dropdown (which has ~200 entries
  and requires inner scrolling to reach Zimbabwe), submit, and assert
  both the POST traffic and the inserted DB row via a follow-up SELECT.
  Combines the dropdown-scroll case with FE→BE traffic capture and a
  DB-side assertion driven by a real dbQuery action.
config:
  timeoutSeconds: 180
items:
  - $ref: ../shared/nextjs-demo.yaml
  - $ref: ../shared/postgres.yaml
  - $ref: ../shared/mock-google-authorize.yaml
  - $ref: ../shared/mock-google-token.yaml
  - $ref: ../shared/mock-google-userinfo.yaml
tests:
  - name: Authenticated user creates a bookmark for Zimbabwe via the scrollable dropdown
    variables:
      bookmarkTitle: Zimbabwe Daily News
      bookmarkUrl: https://example.com/zw-news
      countryCode: ZW
    steps:
      # Group 1 — sign in. Sets the session cookie that group 2 needs.
      - - name: Sign in with Google to obtain a session cookie
          action:
            type: ui
            target: nextjs-demo
            steps:
              - $ref: ../shared/login-flow.yaml
      # Group 2 — open the form, scroll the dropdown to Zimbabwe, submit.
      - - name: Use the country dropdown and submit the bookmark form
          action:
            type: ui
            target: nextjs-demo
            steps:
              - visit: /bookmarks/new
              - waitFor: "[data-testid='new-bookmark-page']"
              # Pristine form state — labels, empty inputs, dropdown closed,
              # default trigger label "Select a country…". Catches form
              # layout regressions before any input has happened.
              - screenshot:
                  name: new-bookmark-form-empty
                  selector: "[data-testid='new-bookmark-page']"
                  match: true
              - type:
                  selector: "[data-testid='bookmark-title-input']"
                  text: '{{bookmarkTitle}}'
              - type:
                  selector: "[data-testid='bookmark-url-input']"
                  text: '{{bookmarkUrl}}'
              # Open the dropdown — its popover is capped at max-height 200px
              # with overflow-y: auto, so the Zimbabwe entry is below the
              # initial visible area and must be scrolled into view first.
              - click: "[data-testid='country-dropdown-trigger']"
              - waitFor: "[data-testid='country-dropdown-list']"
              # Dropdown popover open, scroll-top still 0 → showing the
              # alphabetical top of the country list (Afghanistan, Albania,
              # …). Capture the popover only, not the form, so the input
              # values entered above don't pollute the baseline.
              - screenshot:
                  name: country-dropdown-open
                  selector: "[data-testid='country-dropdown-list']"
                  match: true
              - extract:
                  countryListCount:
                    from: count
                    selector: "[data-testid='country-dropdown-list'] li"
              # Scroll the ZW option into view inside the dropdown's own
              # scroll container. chromedp's auto-scroll-on-click would
              # cover the click itself; doing the scroll explicitly is
              # what this fixture is here to test.
              - scroll: "[data-testid='country-option-{{countryCode}}']"
              - click: "[data-testid='country-option-{{countryCode}}']"
              # The trigger button label updates to the chosen country name.
              - waitFor:
                  selector: "[data-testid='country-dropdown-trigger']"
                  text: Zimbabwe
              - extract:
                  selectedCountry:
                    from: value
                    selector: "[data-testid='country-value']"
              - click: "[data-testid='bookmark-submit']"
              # Browser-form POST → 303 redirect → the home feed re-renders
              # with the new row at the top.
              - waitFor: "[data-testid='home-page']"
              - waitFor:
                  selector: "[data-testid='bookmark-list']"
                  text: '{{bookmarkTitle}}'
              # Feed after submission — the new ZW bookmark sits at the top
              # of the list (DESC order). Title/url/country are all driven
              # by the test variables, so the new card is byte-stable
              # across runs as long as those variables don't change.
              - screenshot:
                  name: home-feed-after-submission
                  selector: "[data-testid='bookmark-list']"
                  match: true
          assertions:
            # The dropdown actually rendered all ~200 options before scroll.
            - assertions:
                - path: $.extracted.countryListCount
                  operator: gte
                  value: 180
                - path: $.extracted.selectedCountry
                  operator: eq
                  value: '{{countryCode}}'
            # FE → BE form POST. Browser sends application/x-www-form-urlencoded;
            # the route handler parses formData and inserts the row.
            - match:
                method: POST
                url: nextjs-demo/api/bookmarks
              count:
                operator: eq
                value: 1
              assertions:
                - path: response.status
                  operator: eq
                  value: 303
                - path: request.body
                  operator: contains
                  value: country={{countryCode}}
      # Group 3 — direct DB read to verify the INSERT actually persisted
      # the row with the chosen country code. The HTTP-call assertion in
      # group 2 confirms the form-POST reached the API; this confirms the
      # API hit the database.
      - - name: Verify the bookmark row was inserted with the chosen country
          action:
            type: dbQuery
            database: postgres-db
            query: SELECT title, url, country FROM bookmarks WHERE country = $1 ORDER BY id DESC LIMIT 1
            params:
              '1': '{{countryCode}}'
          assertions:
            - assertions:
                - path: success
                  operator: eq
                  value: true
                - path: data[0].country
                  operator: eq
                  value: '{{countryCode}}'
                - path: data[0].title
                  operator: eq
                  value: '{{bookmarkTitle}}'
                - path: data[0].url
                  operator: eq
                  value: '{{bookmarkUrl}}'
