name: logout-flow
description: |
  Sign in via OAuth, click the dashboard's Sign-Out button, then prove the
  session was actually cleared by trying to visit /dashboard again — it
  should redirect to /login because the session cookie is gone. Asserts
  the POST to /api/auth/logout (303 redirect to /), and that a follow-up
  visit to /dashboard lands on the login page rather than rendering the
  signed-in card.
config:
  timeoutSeconds: 180
items:
  - $ref: ../shared/nextjs-demo.yaml
  - $ref: ../shared/postgres.yaml
  - $ref: ../shared/mock-google-authorize.yaml
  - $ref: ../shared/mock-google-token.yaml
  - $ref: ../shared/mock-google-userinfo.yaml
tests:
  - name: After sign-out the dashboard becomes inaccessible and redirects to login
    steps:
      # Group 1 — sign in to get a session cookie on the browser.
      - - name: Sign in with Google to obtain a session
          action:
            type: ui
            target: nextjs-demo
            steps:
              - $ref: ../shared/login-flow.yaml
              # Capture the signed-in dashboard immediately before logout —
              # this is the "before" state for the logout flow's diff.
              - screenshot:
                  name: dashboard-pre-logout
                  selector: "[data-testid='dashboard-page']"
                  match: true
      # Group 2 — click the sign-out button. The form posts to
      # /api/auth/logout, which clears the cookie and 303s back to /.
      - - name: Click Sign Out and land on the home feed
          action:
            type: ui
            target: nextjs-demo
            steps:
              - click: "[data-testid='logout-button']"
              # The 303 returns the browser to /, which renders the
              # bookmark feed. Wait on the home page sentinel as proof.
              - waitFor: "[data-testid='home-page']"
              - waitFor:
                  selector: "[data-testid='bookmark-list']"
                  text: Zimbabwe Daily
              # The "after" state — feed renders with the seeded items
              # because the public GET /api/bookmarks doesn't gate on auth.
              # Catches regressions where logout might break the home view.
              - screenshot:
                  name: home-after-logout
                  selector: "[data-testid='bookmark-list']"
                  match: true
              - extract:
                  postLogoutUrl:
                    from: url
                    part: pathname
          assertions:
            # Logout fired and redirected. 303 is what the route handler
            # returns (redirect after POST).
            - match:
                method: POST
                url: nextjs-demo/api/auth/logout
              count:
                operator: eq
                value: 1
              assertions:
                - path: response.status
                  operator: eq
                  value: 303
            - assertions:
                - path: $.extracted.postLogoutUrl
                  operator: eq
                  value: /
      # Group 3 — try /dashboard again. The server-side getSession() call
      # will return null (cookie gone), so Next.js redirects the browser
      # to /login. We never see the dashboard card; we land on the login
      # button. This is the real proof that the session was cleared.
      - - name: Visiting /dashboard after sign-out redirects to /login
          action:
            type: ui
            target: nextjs-demo
            steps:
              - visit: /dashboard
              - waitFor: "[data-testid='login-page']"
              - extract:
                  finalPath:
                    from: url
                    part: pathname
                  loginButtonExists:
                    from: exists
                    selector: "[data-testid='login-google-button']"
                  dashboardCardExists:
                    from: exists
                    selector: "[data-testid='dashboard-page']"
          assertions:
            - assertions:
                - path: $.extracted.finalPath
                  operator: eq
                  value: /login
                - path: $.extracted.loginButtonExists
                  operator: eq
                  value: 'true'
                - path: $.extracted.dashboardCardExists
                  operator: eq
                  value: 'false'
